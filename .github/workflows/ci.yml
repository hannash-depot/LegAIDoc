name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: legaidoc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/legaidoc?schema=public
      NEXTAUTH_SECRET: ci-smoke-secret-32-characters-minimum
      NEXTAUTH_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_TERMS_VERSION: 2026-02-25
      NEXT_PUBLIC_PRIVACY_VERSION: 2026-02-25
      ALERT_WEBHOOK_URL: ""
      RESEND_API_KEY: ""
      EMAIL_FROM: LegAIDoc <noreply@example.com>
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Prepare database schema
        run: npm run db:push

      - name: Seed database
        run: npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke
