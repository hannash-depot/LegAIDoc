services:
  postgres:
    image: postgres:16-alpine
    container_name: legaidoc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: legaidoc
      POSTGRES_PASSWORD: legaidoc
      POSTGRES_DB: legaidoc
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
